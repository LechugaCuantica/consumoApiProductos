<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>CRUD Completo MockAPI</title>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        input {
            margin: 5px;
            padding: 8px;
        }

        button {
            padding: 6px 10px;
            margin: 2px;
            cursor: pointer;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        table,
        th,
        td {
            border: 1px solid #ccc;
        }

        th,
        td {
            padding: 10px;
        }

        th {
            background: #f2f2f2;
        }
    </style>
</head>

<body>

    <h2>CRUD Completo con MockAPI</h2>

    <!-- FORMULARIO -->
    <input type="text" id="nombre" placeholder="Nombre">
    <input type="email" id="email" placeholder="Email">

    <button onclick="crearUsuario()">Guardar</button>
    <button onclick="obtenerUsuarios()">Refrescar</button>

    <hr>

    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Email</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody id="tabla"></tbody>
    </table>

    <script src="app.js"></script>

</body>

</html>
